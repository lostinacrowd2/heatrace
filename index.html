<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeatRace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <style>
    body { font-family: system-ui; transition: all 0.3s; }
    .temp-input { font-size: 1.75rem; }
    table input { font-size: 1rem; }
    /* Light mode overrides */
    .light { 
      --tw-bg-opacity: 1; 
      background-color: rgb(249 250 251 / var(--tw-bg-opacity)); 
      color: #111827; 
    }
    .light .bg-zinc-950 { background-color: #f3f4f6; }
    .light .bg-zinc-900 { background-color: #e5e7eb; }
    .light .bg-zinc-800 { background-color: #d1d5db; }
    .light .bg-green-600 { background-color: #16a34a; }
    .light .bg-red-600 { background-color: #dc2626; }
    .light .bg-blue-600 { background-color: #2563eb; }
    .light .bg-orange-500 { background-color: #f97316; }
    .light .text-white { color: #111827; }
    .light .text-zinc-400 { color: #4b5563; }
    .light .text-zinc-500 { color: #6b7280; }
    .light .border-zinc-700 { border-color: #9ca3af; }
    .light .border-zinc-600 { border-color: #9ca3af; }
    .light .hover\:bg-zinc-700:hover { background-color: #cbd5e1; }
    .light .hover\:bg-zinc-800\/50:hover { background-color: rgba(229,231,235,0.5); }
    .light .bg-zinc-800\/50 { background-color: rgba(209,213,219,0.5); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen transition-colors">
  <div class="max-w-xl mx-auto p-3">
    <div class="flex justify-between items-center mb-4">
      <div>
        <h1 class="text-3xl font-bold text-orange-400">HeatRace</h1>
        <p class="text-zinc-400 text-xs" id="unitSubtitle">Who's heating faster? (°C)</p>
      </div>
      <div class="flex items-center gap-3">
        <div id="timer" class="text-4xl font-mono font-bold text-orange-400 tabular-nums">00:00</div>
        <button onclick="toggleUnit()" id="unitBtn" class="px-3 py-1 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm font-medium border border-zinc-600">
          °C
        </button>
      </div>
    </div>

    <div class="flex gap-3 mb-5">
      <button onclick="toggleTimer()" id="startBtn" class="flex-1 bg-orange-500 hover:bg-orange-600 py-3 rounded-2xl font-bold text-lg">START</button>
      <button onclick="resetTimer()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl font-bold text-lg">RESET</button>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
      <!-- Fixture Old -->
      <div class="bg-zinc-900 rounded-3xl p-4">
        <input id="label1" class="bg-transparent text-xl font-bold w-full outline-none text-center" onchange="updateLabels()">
        <div class="mt-3 flex items-center gap-2">
          <input id="temp1" type="number" step="0.1" class="temp-input bg-zinc-800 w-full text-center rounded-2xl p-3 outline-none" onfocus="this.value=''">
          <span class="text-2xl text-zinc-400">°<span id="unit1">C</span></span>
        </div>
      </div>

      <!-- Fixture New -->
      <div class="bg-zinc-900 rounded-3xl p-4">
        <input id="label2" class="bg-transparent text-xl font-bold w-full outline-none text-center" onchange="updateLabels()">
        <div class="mt-3 flex items-center gap-2">
          <input id="temp2" type="number" step="0.1" class="temp-input bg-zinc-800 w-full text-center rounded-2xl p-3 outline-none" onfocus="this.value=''">
          <span class="text-2xl text-zinc-400">°<span id="unit2">C</span></span>
        </div>
      </div>
    </div>

    <button onclick="logReading()" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-3xl text-xl font-bold mb-6">📍 LOG BOTH TEMPS NOW</button>

    <div class="mb-6">
      <canvas id="tempChart" class="w-full"></canvas>
    </div>

    <div id="winner" class="text-center text-xl font-bold mb-6 hidden"></div>

    <!-- Bottom controls row -->
    <div class="flex flex-wrap gap-3 mb-6 items-end">
      <button onclick="exportCSV()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-3 rounded-2xl font-bold text-lg min-w-[120px]">💾 Export CSV</button>
      <button onclick="clearData()" class="flex-1 bg-red-600 hover:bg-red-500 py-3 rounded-2xl font-bold text-lg min-w-[120px]">🗑️ Clear All</button>
      
      <div class="flex gap-2 items-center flex-wrap">
        <button onclick="toggleTheme()" class="px-3 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm font-medium border border-zinc-600 whitespace-nowrap">
          🌙 / ☀️
        </button>
        <div class="bg-zinc-900 rounded-xl px-3 py-2 text-center min-w-[80px]">
          <div class="text-xs text-zinc-500">RATE</div>
          <div id="rate1" class="text-xl font-bold text-orange-400">0.0</div>
          <div id="rateUnit1" class="text-xs text-zinc-500">°C/min</div>
        </div>
        <div class="bg-zinc-900 rounded-xl px-3 py-2 text-center min-w-[80px]">
          <div class="text-xs text-zinc-500">RATE</div>
          <div id="rate2" class="text-xl font-bold text-orange-400">0.0</div>
          <div id="rateUnit2" class="text-xs text-zinc-500">°C/min</div>
        </div>
      </div>
    </div>

    <div class="border-t border-zinc-700 pt-6">
      <h2 class="text-lg font-semibold mb-3 text-orange-300">📋 Logged Readings (tap numbers to edit)</h2>
      <div class="overflow-auto max-h-[300px] rounded-2xl bg-zinc-900 p-2">
        <table id="logTable" class="w-full text-sm"></table>
      </div>
    </div>

    <!-- Reload from web button (shows in
