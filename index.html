<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeatRace</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f59e0b">
  <style>
    body { font-family: system-ui; }
    .temp-input { font-size: 1.5rem; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-xl mx-auto p-4">
    <div class="flex justify-between items-center mb-6">
      <div>
        <h1 class="text-4xl font-bold text-orange-400">HeatRace</h1>
        <p class="text-zinc-400 text-sm">Who's heating faster?</p>
      </div>
      <div id="timer" class="text-5xl font-mono font-bold text-orange-400 tabular-nums">00:00</div>
    </div>

    <div class="flex gap-3 mb-6">
      <button onclick="toggleTimer()" id="startBtn" class="flex-1 bg-orange-500 hover:bg-orange-600 py-4 rounded-2xl font-bold text-xl">START</button>
      <button onclick="resetTimer()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-4 rounded-2xl font-bold text-xl">RESET</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
      <!-- Item 1 -->
      <div class="bg-zinc-900 rounded-3xl p-5">
        <input id="label1" value="Cast Iron" class="bg-transparent text-2xl font-bold w-full outline-none text-center" onchange="updateLabels()">
        <div class="mt-4 flex items-center gap-3">
          <input id="temp1" type="number" step="0.1" placeholder="Temp" class="temp-input bg-zinc-800 w-full text-center rounded-2xl p-4 text-4xl outline-none">
          <span class="text-3xl text-zinc-400">°<span id="unit1">F</span></span>
        </div>
      </div>

      <!-- Item 2 -->
      <div class="bg-zinc-900 rounded-3xl p-5">
        <input id="label2" value="Aluminum" class="bg-transparent text-2xl font-bold w-full outline-none text-center" onchange="updateLabels()">
        <div class="mt-4 flex items-center gap-3">
          <input id="temp2" type="number" step="0.1" placeholder="Temp" class="temp-input bg-zinc-800 w-full text-center rounded-2xl p-4 text-4xl outline-none">
          <span class="text-3xl text-zinc-400">°<span id="unit2">F</span></span>
        </div>
      </div>
    </div>

    <button onclick="logReading()" class="w-full bg-green-600 hover:bg-green-500 py-5 rounded-3xl text-2xl font-bold mb-8">📍 LOG BOTH TEMPS NOW</button>

    <div class="mb-8">
      <canvas id="tempChart" class="w-full"></canvas>
    </div>

    <div class="grid grid-cols-2 gap-4 text-center mb-8">
      <div class="bg-zinc-900 rounded-3xl p-6">
        <div class="text-xs text-zinc-400 mb-1">RATE</div>
        <div id="rate1" class="text-4xl font-bold text-orange-400">0.0</div>
        <div class="text-sm text-zinc-400">°F/min</div>
      </div>
      <div class="bg-zinc-900 rounded-3xl p-6">
        <div class="text-xs text-zinc-400 mb-1">RATE</div>
        <div id="rate2" class="text-4xl font-bold text-orange-400">0.0</div>
        <div class="text-sm text-zinc-400">°F/min</div>
      </div>
    </div>

    <div id="winner" class="text-center text-2xl font-bold mb-8 hidden"></div>

    <div class="flex gap-3">
      <button onclick="exportCSV()" class="flex-1 bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold">💾 Export CSV</button>
      <button onclick="clearData()" class="flex-1 bg-red-600 hover:bg-red-500 py-4 rounded-2xl font-bold">🗑️ Clear</button>
    </div>
  </div>

  <script>
    let data = [];
    let chart;
    let startTime = null;
    let timerInterval = null;
    let elapsed = 0;
    let isRunning = false;
    let label1 = "Cast Iron";
    let label2 = "Aluminum";
    let unit = "F";

    const ctx = document.getElementById('tempChart').getContext('2d');
    chart = new Chart(ctx, {
      type: 'line',
      data: { datasets: [
        { label: label1, borderColor: '#f59e0b', tension: 0.3, data: [] },
        { label: label2, borderColor: '#22c55e', tension: 0.3, data: [] }
      ]},
      options: { scales: { x: { title: { display: true, text: 'Time (seconds)' } }, y: { title: { display: true, text: `Temperature (°${unit})` } } }, plugins: { legend: { position: 'top' } } }
    });

    function updateTimer() {
      if (!isRunning) return;
      elapsed = Math.floor((Date.now() - startTime) / 1000);
      const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const sec = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${min}:${sec}`;
    }

    function toggleTimer() {
      if (!isRunning) {
        if (!startTime) startTime = Date.now();
        isRunning = true;
        document.getElementById('startBtn').textContent = 'PAUSE';
        timerInterval = setInterval(updateTimer, 1000);
      } else {
        isRunning = false;
        clearInterval(timerInterval);
        document.getElementById('startBtn').textContent = 'RESUME';
      }
    }

    function resetTimer() {
      isRunning = false;
      clearInterval(timerInterval);
      elapsed = 0;
      startTime = null;
      document.getElementById('timer').textContent = '00:00';
      document.getElementById('startBtn').textContent = 'START';
    }

    function updateLabels() {
      label1 = document.getElementById('label1').value || "Cast Iron";
      label2 = document.getElementById('label2').value || "Aluminum";
      chart.data.datasets[0].label = label1;
      chart.data.datasets[1].label = label2;
      chart.update();
    }

    function logReading() {
      if (!isRunning) { alert("Start the timer first!"); return; }
      const t1 = parseFloat(document.getElementById('temp1').value);
      const t2 = parseFloat(document.getElementById('temp2').value);
      if (isNaN(t1) || isNaN(t2)) { alert("Enter both temperatures"); return; }

      data.push({ time: elapsed, temp1: t1, temp2: t2 });
      updateChart();
      calculateRates();
      // keep last values for convenience
    }

    function updateChart() {
      chart.data.labels = data.map(d => d.time);
      chart.data.datasets[0].data = data.map(d => d.temp1);
      chart.data.datasets[1].data = data.map(d => d.temp2);
      chart.update();
    }

    function linearSlope(points) {
      if (points.length < 2) return 0;
      let n = points.length;
      let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
      for (let p of points) {
        sumX += p.time;
        sumY += p.y;
        sumXY += p.time * p.y;
        sumXX += p.time * p.time;
      }
      return (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
    }

    function calculateRates() {
      if (data.length < 2) return;

      const points1 = data.map(d => ({time: d.time, y: d.temp1}));
      const points2 = data.map(d => ({time: d.time, y: d.temp2}));

      let rate1 = linearSlope(points1) * 60; // ° per minute
      let rate2 = linearSlope(points2) * 60;

      document.getElementById('rate1').textContent = rate1.toFixed(2);
      document.getElementById('rate2').textContent = rate2.toFixed(2);

      const winnerEl = document.getElementById('winner');
      if (rate1 > rate2) {
        winnerEl.textContent = `🏆 ${label1} is winning!`;
        winnerEl.className = "text-center text-2xl font-bold text-orange-400";
      } else if (rate2 > rate1) {
        winnerEl.textContent = `🏆 ${label2} is winning!`;
        winnerEl.className = "text-center text-2xl font-bold text-green-400";
      } else {
        winnerEl.textContent = "It's a tie!";
      }
      winnerEl.classList.remove('hidden');
    }

    function exportCSV() {
      if (data.length === 0) { alert("No data yet!"); return; }
      let csv = `Time (seconds),${label1} (°${unit}),${label2} (°${unit})\n`;
      data.forEach(row => {
        csv += `${row.time},${row.temp1},${row.temp2}\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `heatrace_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    function clearData() {
      if (confirm("Clear all data?")) {
        data = [];
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        chart.data.datasets[1].data = [];
        chart.update();
        document.getElementById('rate1').textContent = "0.0";
        document.getElementById('rate2').textContent = "0.0";
        document.getElementById('winner').classList.add('hidden');
      }
    }

    // Register service worker for offline + install
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Tailwind ready
    document.documentElement.style.setProperty('--tw-ring-color', '#f59e0b');
  </script>
</body>
</html>
